<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tonix</title>
  </head>
  <body style="margin: 0; padding: 0; min-height: 100vh; background-color: rgb(219, 222, 231); display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <div style="background-color: #ffffff; border-radius: 16px; padding: 56px 48px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);">
      <div style="width: 64px; height: 64px; background-color: rgb(245, 165, 60); border-radius: 50%; margin: 0 auto 32px; display: flex; align-items: center; justify-content: center;">
        <svg role="img" aria-label="Success" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1 style="margin: 0 0 16px; font-size: 26px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px;">You're all set!</h1>
      <p style="margin: 0; font-size: 16px; line-height: 1.7; color: #555566;">
        Thanks for signing up! Go back to the app and sign in to get started!
      </p>
    </div>
  </body>
</html>
